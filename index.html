<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لعبة الميزان</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #0a0f1e;
            color: white;
            margin: 0;
            overflow: hidden;
            user-select: none;
            /* استخدام dvh لضمان التوافق مع شاشات الجوال ومتصفح كروم */
            height: 100vh;
            height: 100dvh;
        }

        @keyframes swing {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(10deg); }
        }

        .animate-swing {
            animation: swing 2s ease-in-out infinite;
        }

        .beam-transition {
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pan-transition {
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.5s ease;
        }

        * {
            touch-action: manipulation;
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- Header -->
    <div class="p-3 flex justify-between items-center bg-[#151b2d] border-b border-white/5 z-50 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20 overflow-hidden">
                <span class="text-2xl inline-block animate-swing">⚖️</span>
            </div>
            <h1 class="font-black text-lg tracking-tight">لعبة الميزان</h1>
        </div>
        <div class="flex gap-2 text-center">
            <div class="bg-[#1f2943] px-3 py-1.5 rounded-xl border border-white/5 text-[10px] font-bold">
                السؤال <span id="current-level">1</span> / 4
            </div>
            <div class="bg-emerald-500/10 text-emerald-400 px-3 py-1.5 rounded-xl border border-emerald-500/20 text-[10px] font-bold">
                <span id="score">0</span> ن
            </div>
        </div>
    </div>

    <!-- Main Game Area -->
    <div class="flex-1 relative flex flex-col items-center justify-center p-4 min-h-0">
        
        <div class="relative w-full max-w-[260px] h-[220px] flex justify-center items-center shrink-0">
            
            <!-- Static Pillar -->
            <div class="absolute bottom-4 w-24 h-2 bg-[#1f2943] rounded-full"></div>
            <div class="absolute bottom-6 w-2 h-32 bg-gradient-to-t from-[#2d3748] to-[#4a5568] rounded-full"></div>
            <div class="absolute top-[60px] w-5 h-5 bg-[#cbd5e0] rounded-full z-40 border-[3px] border-[#4a5568] shadow-md"></div>

            <!-- Dynamic Beam Wrapper -->
            <div id="beam-wrapper" class="absolute top-[68px] w-full beam-transition z-30" style="transform: rotate(-10deg); transform-origin: center center;">
                <div class="w-full h-1.5 bg-gradient-to-b from-[#a0aec0] to-[#4a5568] rounded-full shadow-sm relative">
                    
                    <!-- Left Pan (Question) -->
                    <div id="pan-left" class="absolute left-0 top-0 flex flex-col items-center pan-transition" style="transform: rotate(10deg); transform-origin: top center;">
                        <div class="w-[1.5px] h-14 bg-[#718096]"></div>
                        <div class="w-20 min-h-[65px] bg-[#151b2d]/95 border-2 border-blue-500/40 rounded-b-[30px] flex flex-col items-center justify-center p-2 shadow-2xl backdrop-blur-sm -translate-y-[1px]">
                            <span class="text-[6px] text-blue-400 font-black mb-1 opacity-60">المسألة</span>
                            <div id="question-text" class="text-[9px] font-black text-center leading-tight">20% من 392</div>
                        </div>
                    </div>

                    <!-- Right Pan (Answer) -->
                    <div id="pan-right" class="absolute right-0 top-0 flex flex-col items-center pan-transition" style="transform: rotate(10deg); transform-origin: top center;">
                        <div class="w-[1.5px] h-14 bg-[#718096]"></div>
                        <div id="answer-box" class="w-20 min-h-[65px] bg-[#151b2d]/95 border-2 border-emerald-500/20 rounded-b-[30px] flex flex-col items-center justify-center p-2 shadow-2xl backdrop-blur-sm -translate-y-[1px]">
                            <span class="text-[6px] text-emerald-400 font-black mb-1 opacity-60">تقديرك</span>
                            <div id="answer-text" class="text-lg font-black">؟</div>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Feedback Messages -->
        <div id="feedback" class="h-6 mt-6 flex items-center justify-center text-[10px] font-black"></div>
    </div>

    <!-- Controls Area -->
    <div class="bg-[#151b2d] p-4 pb-6 rounded-t-[40px] border-t border-white/5 shadow-2xl z-50 shrink-0">
        <div class="flex justify-between items-center mb-4 px-1">
            <span class="text-slate-500 text-[9px] font-black uppercase tracking-widest">أدخل التقدير:</span>
            <button onclick="showHint()" class="flex items-center gap-1.5 text-amber-500 text-[10px] font-black bg-amber-500/10 px-3 py-1.5 rounded-full active:scale-90 transition-transform shadow-sm">
                💡 تلميح
            </button>
        </div>

        <div class="grid grid-cols-5 gap-2 mb-4">
            <button onclick="addNum(1)" class="h-12 bg-[#1f2943] hover:bg-[#2d3748] active:bg-blue-600 active:scale-90 transition-all rounded-xl font-black text-lg shadow-[0_3px_0_rgb(10,15,30)] border border-white/5">1</button>
            <button onclick="addNum(2)" class="h-12 bg-[#1f2943] hover:bg-[#2d3748] active:bg-blue-600 active:scale-90 transition-all rounded-xl font-black text-lg shadow-[0_3px_0_rgb(10,15,30)] border border-white/5">2</button>
            <button onclick="addNum(3)" class="h-12 bg-[#1f2943] hover:bg-[#2d3748] active:bg-blue-600 active:scale-90 transition-all rounded-xl font-black text-lg shadow-[0_3px_0_rgb(10,15,30)] border border-white/5">3</button>
            <button onclick="addNum(4)" class="h-12 bg-[#1f2943] hover:bg-[#2d3748] active:bg-blue-600 active:scale-90 transition-all rounded-xl font-black text-lg shadow-[0_3px_0_rgb(10,15,30)] border border-white/5">4</button>
            <button onclick="addNum(5)" class="h-12 bg-[#1f2943] hover:bg-[#2d3748] active:bg-blue-600 active:scale-90 transition-all rounded-xl font-black text-lg shadow-[0_3px_0_rgb(10,15,30)] border border-white/5">5</button>
            <button onclick="addNum(6)" class="h-12 bg-[#1f2943] hover:bg-[#2d3748] active:bg-blue-600 active:scale-90 transition-all rounded-xl font-black text-lg shadow-[0_3px_0_rgb(10,15,30)] border border-white/5">6</button>
            <button onclick="addNum(7)" class="h-12 bg-[#1f2943] hover:bg-[#2d3748] active:bg-blue-600 active:scale-90 transition-all rounded-xl font-black text-lg shadow-[0_3px_0_rgb(10,15,30)] border border-white/5">7</button>
            <button onclick="addNum(8)" class="h-12 bg-[#1f2943] hover:bg-[#2d3748] active:bg-blue-600 active:scale-90 transition-all rounded-xl font-black text-lg shadow-[0_3px_0_rgb(10,15,30)] border border-white/5">8</button>
            <button onclick="addNum(9)" class="h-12 bg-[#1f2943] hover:bg-[#2d3748] active:bg-blue-600 active:scale-90 transition-all rounded-xl font-black text-lg shadow-[0_3px_0_rgb(10,15,30)] border border-white/5">9</button>
            <button onclick="addNum(0)" class="h-12 bg-[#1f2943] hover:bg-[#2d3748] active:bg-blue-600 active:scale-90 transition-all rounded-xl font-black text-lg shadow-[0_3px_0_rgb(10,15,30)] border border-white/5">0</button>
        </div>

        <div class="flex gap-3">
            <button onclick="clearInput()" class="w-1/3 h-12 bg-slate-700 hover:bg-slate-600 rounded-xl font-bold text-xs flex items-center justify-center gap-2 transition-all active:scale-95 border border-white/5">
                مسح
            </button>
            <button id="check-btn" onclick="checkAnswer()" class="flex-1 h-12 rounded-xl font-black text-sm transition-all active:scale-95 shadow-lg bg-[#1f2943] text-slate-600 opacity-50" disabled>
                تحقق من التوازن
            </button>
        </div>
    </div>

    <!-- Modals -->
    <div id="hint-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-6 bg-black/80 backdrop-blur-sm">
        <div class="bg-[#151b2d] p-8 rounded-[40px] border border-white/10 max-w-[300px] w-full text-center shadow-2xl">
            <div class="w-14 h-14 bg-amber-500/20 rounded-full flex items-center justify-center mx-auto mb-4 text-amber-500 text-2xl">💡</div>
            <h2 class="text-xl font-black text-white mb-3">كيف نحل؟ 💡</h2>
            <p id="hint-text" class="text-slate-300 text-sm leading-relaxed mb-8"></p>
            <button onclick="closeModal('hint-modal')" class="w-full py-4 bg-slate-700 hover:bg-slate-600 rounded-2xl font-bold text-sm">فهمت!</button>
        </div>
    </div>

    <div id="win-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-6 bg-[#0a0f1e]/98 backdrop-blur-xl">
        <div class="text-center">
            <div class="text-7xl mb-6 animate-bounce">🏆</div>
            <h2 class="text-4xl font-black text-white mb-2">ممتاز!</h2>
            <p class="text-slate-400 text-lg mb-10">لقد وازنت جميع المسائل بذكاء</p>
            <button onclick="location.reload()" class="px-16 py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black text-xl shadow-2xl active:scale-95 transition-transform">إعادة اللعب</button>
        </div>
    </div>

    <script>
        const questions = [
            { q: "20% من 392", a: 80, hint: "قرب 392 إلى 400. العشرون بالمئة هي الخُمس (1/5). 400 ÷ 5 = 80" },
            { q: "78% من 112", a: 88, hint: "قرب 78% إلى 80% وقرب 112 إلى 110. 80% من 110 تساوي 88" },
            { q: "52% من 395", a: 200, hint: "قرب 52% إلى 50% (النصف) وقرب 395 إلى 400. نصف الـ 400 هو 200" },
            { q: "79% من 88", a: 72, hint: "قرب 79% إلى 80% وقرب 88 إلى 90. 80% من 90 تساوي 72" }
        ];

        let level = 0;
        let userInput = "";
        let score = 0;
        let isCorrect = false;

        function updateScale() {
            const beam = document.getElementById('beam-wrapper');
            const panL = document.getElementById('pan-left');
            const panR = document.getElementById('pan-right');
            const answerDisplay = document.getElementById('answer-text');
            const checkBtn = document.getElementById('check-btn');

            answerDisplay.innerText = userInput || "؟";

            let tilt = -10;
            if (userInput !== "") {
                const userVal = parseInt(userInput);
                const targetVal = questions[level].a;
                let diff = userVal - targetVal;
                tilt = (diff / targetVal) * 20;
                tilt = Math.max(-18, Math.min(18, tilt));
                
                checkBtn.disabled = false;
                checkBtn.classList.remove('opacity-50', 'text-slate-600');
                checkBtn.classList.add('bg-blue-600', 'text-white');
            } else {
                checkBtn.disabled = true;
                checkBtn.classList.add('opacity-50', 'text-slate-600');
                checkBtn.classList.remove('bg-blue-600', 'text-white');
            }

            if (isCorrect) tilt = 0;

            beam.style.transform = `rotate(${tilt}deg)`;
            panL.style.transform = `rotate(${-tilt}deg) translateX(-50%)`;
            panR.style.transform = `rotate(${-tilt}deg) translateX(50%)`;
        }

        function addNum(n) {
            if (userInput.length < 3 && !isCorrect) {
                userInput += n;
                updateScale();
            }
        }

        function clearInput() {
            if (isCorrect) return;
            userInput = "";
            updateScale();
        }

        function checkAnswer() {
            const userVal = parseInt(userInput);
            const targetVal = questions[level].a;
            const feedback = document.getElementById('feedback');
            const answerBox = document.getElementById('answer-box');
            const checkBtn = document.getElementById('check-btn');

            if (userVal === targetVal) {
                isCorrect = true;
                score += 25;
                document.getElementById('score').innerText = score;
                answerBox.classList.replace('border-emerald-500/20', 'border-emerald-500');
                feedback.innerHTML = `<span class="text-emerald-400">✅ توازن الميزان بنجاح!</span>`;
                checkBtn.innerText = "متوازن! ✅";
                checkBtn.classList.replace('bg-blue-600', 'bg-emerald-600');
                updateScale();

                setTimeout(() => {
                    level++;
                    if (level < questions.length) {
                        resetLevel();
                    } else {
                        document.getElementById('win-modal').style.display = 'flex';
                    }
                }, 1500);
            } else {
                feedback.innerHTML = `<span class="text-rose-400">❌ غير متوازن.. حاول مرة أخرى</span>`;
                setTimeout(() => { feedback.innerHTML = ""; }, 1500);
            }
        }

        function resetLevel() {
            userInput = "";
            isCorrect = false;
            document.getElementById('current-level').innerText = level + 1;
            document.getElementById('question-text').innerText = questions[level].q;
            document.getElementById('feedback').innerHTML = "";
            document.getElementById('answer-box').classList.replace('border-emerald-500', 'border-emerald-500/20');
            const checkBtn = document.getElementById('check-btn');
            checkBtn.innerText = "تحقق من التوازن";
            checkBtn.classList.replace('bg-emerald-600', 'bg-blue-600');
            updateScale();
        }

        function showHint() {
            document.getElementById('hint-text').innerText = questions[level].hint;
            document.getElementById('hint-modal').style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target.classList.contains('fixed')) {
                event.target.style.display = 'none';
            }
        }

        updateScale();
    </script>
</body>
</html>
